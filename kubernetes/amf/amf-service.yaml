apiVersion: v1
kind: Service
metadata:
  name: amf-service
  labels:
    app: amf-service
spec:
  type: ClusterIP
  selector:
    app: amf-service
  ports:
    - name: http
      port: 8086
      targetPort: 8086
      protocol: TCP
    - name: metrics
      port: 8006
      targetPort: 8006
      protocol: TCP
