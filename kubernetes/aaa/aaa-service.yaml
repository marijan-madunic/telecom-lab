apiVersion: v1
kind: Service
metadata:
  name: aaa-service
  labels:
    app: aaa-service
spec:
  type: ClusterIP
  selector:
    app: aaa-service
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 8000
      targetPort: 8000
