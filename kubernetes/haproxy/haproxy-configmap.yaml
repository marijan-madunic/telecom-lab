apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 4096

    defaults
      mode http
      log global
      option httplog
      option dontlognull
      timeout connect 5s
      timeout client 30s
      timeout server 30s

    frontend telecom_api
      bind *:8080

      acl is_aaa  path_beg /aaa
      acl is_ausf path_beg /ausf
      acl is_udm  path_beg /udm
      acl is_pcf  path_beg /pcf
      acl is_ocs  path_beg /ocs
      acl is_pcrf path_beg /pcrf
      acl is_smsc path_beg /smsc
      acl is_amf  path_beg /amf
      acl is_smf  path_beg /smf

      use_backend aaa_backend  if is_aaa
      use_backend ausf_backend if is_ausf
      use_backend udm_backend  if is_udm
      use_backend pcf_backend  if is_pcf
      use_backend ocs_backend  if is_ocs
      use_backend pcrf_backend if is_pcrf
      use_backend smsc_backend if is_smsc
      use_backend amf_backend  if is_amf
      use_backend smf_backend  if is_smf

      default_backend default_backend

    backend aaa_backend
      http-request replace-path ^/aaa/?(.*) /\1
      server aaa aaa-service:8080 check

    backend ausf_backend
      http-request replace-path ^/ausf/?(.*) /\1
      server ausf ausf-service:8085 check

    backend udm_backend
      http-request replace-path ^/udm/?(.*) /\1
      server udm udm-service:8082 check

    backend pcf_backend
      http-request replace-path ^/pcf/?(.*) /\1
      server pcf pcf-service:8084 check

    backend ocs_backend
      http-request replace-path ^/ocs/?(.*) /\1
      server ocs ocs-service:8083 check

    backend pcrf_backend
      http-request replace-path ^/pcrf/?(.*) /\1
      server pcrf pcrf-service:8081 check

    backend smsc_backend
      http-request replace-path ^/smsc/?(.*) /\1
      server smsc smsc-service:8080 check

    backend amf_backend
      http-request replace-path ^/amf/?(.*) /\1
      server amf amf-service:8086 check

    backend smf_backend
      http-request replace-path ^/smf/?(.*) /\1
      server smf smf-service:8083 check

    backend default_backend
      http-request return status 404 content-type application/json string '{"error":"route not found"}'

    frontend stats
      bind *:8404
      stats enable
      stats uri /stats
      http-request use-service prometheus-exporter if { path /metrics }
