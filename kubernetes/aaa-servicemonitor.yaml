apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aaa-service-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: aaa-service
  endpoints:
    - port: metrics
      path: /metrics
      interval: 60s
